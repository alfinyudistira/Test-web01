<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="color-scheme" content="dark light" />
    <meta name="generator" content="Pulse Enterprise Framework - Vite 8 + React 19" />

    <title>%VITE_APP_NAME% — Enterprise Talent Acquisition Platform</title>
    <meta name="description" content="Science-backed, bias-free hiring decisions for global enterprises. Fit scoring, funnel analytics, D&I dashboard, executive BI." />
    <meta name="keywords" content="hiring platform, talent acquisition, HR analytics, AI hiring, fit calculator, SaaS, enterprise HR" />
    <meta name="author" content="Pulse Systems" />
    <meta name="robots" content="index, follow" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://vercel.live;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: https:;
        connect-src 'self' https: wss: ws: http://localhost:* http://127.0.0.1:* *.sentry.io;
        worker-src 'self' blob:;
        manifest-src 'self';
      "
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background-color: #0D0D0D;
        color: #FFFFFF;
        font-family: system-ui, -apple-system, sans-serif;
        overflow-x: hidden;
      }
      
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0D0D0D;
        z-index: 9999;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      .pulse-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(200, 169, 126, 0.1);
        border: 2px solid rgba(200, 169, 126, 0.8);
        animation: pulse-animation 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 20px rgba(200, 169, 126, 0.2);
        will-change: transform, opacity, box-shadow;
      }
      .loader-text {
        color: #C8A97E;
        font-size: 0.875rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
      }
      @keyframes pulse-animation {
        0% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 30px rgba(200, 169, 126, 0.4); }
        100% { transform: scale(0.8); opacity: 0.5; }
      }
    </style>
  </head>

  <body>
    <div id="root" role="application" aria-label="%VITE_APP_NAME%"></div>

    <div id="app-loader" aria-hidden="true">
      <div class="pulse-ring"></div>
      <div class="loader-text">Initializing Engine...</div>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.removePulseLoader = function() {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 500); 
        }
      };
      
      setTimeout(() => {
        if (document.getElementById('app-loader')) {
          console.warn('⚠️ [Pulse Core] Failsafe triggered: React rendering timeout.');
          window.removePulseLoader();
        }
      }, 6000);
    </script>
  </body>
</html>
